<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HIP-3 Spread Tool</title>
  <link rel="stylesheet" href="assets/style.css" />
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <div id="top-bar">
      <h1>HIP-3 Spread Tool</h1>
      <div id="top-actions">
        <button id="btn-save" title="Save screenshot + config">Save</button>
        <button id="btn-upload" title="Upload saved config">Upload</button>
        <input type="file" id="file-upload" accept=".json" style="display:none" />
      </div>
    </div>

    <!-- Input section -->
    <div id="input-section">
      <div class="input-row">
        <span class="input-leg-label long">Long</span>
        <input type="text" id="input-asset1" placeholder="xyz:BRENTOIL or trade URL" />
      </div>
      <div class="flip-row">
        <button id="btn-flip-direction" title="Flip LONG ↕ SHORT">↕</button>
      </div>
      <div class="input-row">
        <span class="input-leg-label short">Short</span>
        <input type="text" id="input-asset2" placeholder="xyz:CL or trade URL" />
      </div>
      <div class="input-row controls-row">
        <div class="timeframe-group">
          <label>Timeframe:</label>
          <select id="select-interval">
            <option value="1m">1m</option>
            <option value="5m">5m</option>
            <option value="15m">15m</option>
            <option value="1h" selected>1h</option>
            <option value="4h">4h</option>
            <option value="1d">1d</option>
          </select>
          <label>Period:</label>
          <select id="select-period">
            <option value="1">1 day</option>
            <option value="3">3 days</option>
            <option value="7" selected>7 days</option>
            <option value="14">14 days</option>
            <option value="30">30 days</option>
          </select>
        </div>
        <button id="btn-load">Load Data</button>
      </div>
    </div>

    <!-- Charts section -->
    <div id="charts-section" style="display:none;">
      <!-- Funding chart -->
      <div class="chart-container">
        <div class="chart-header">
          <span class="chart-title">Funding Rates</span>
          <div class="chart-legend" id="funding-legend"></div>
        </div>
        <div id="funding-chart" class="chart-area"></div>
      </div>

      <!-- Spread chart -->
      <div class="chart-container">
        <div class="chart-header">
          <span class="chart-title">Price Spread</span>
          <div class="chart-controls">
            <button id="btn-swap-spread" class="ctrl-btn" title="Swap subtraction order">Swap A↔B</button>
            <button id="btn-candle-line" class="ctrl-btn" title="Toggle candle/line">Line</button>
            <button id="btn-spread-unit" class="ctrl-btn active" title="Toggle $ / %">%</button>
          </div>
          <div class="chart-legend" id="spread-legend"></div>
        </div>
        <div id="spread-chart" class="chart-area"></div>
      </div>
    </div>

      <!-- PnL Analysis -->
      <div id="pnl-section" class="chart-container" style="display:none;">
        <div class="chart-header">
          <span class="chart-title">Spread Trade P&L</span>
          <div class="pnl-input-group">
            <span class="dollar-sign">$</span>
            <input type="text" id="input-position-size" value="10000" inputmode="numeric" />
          </div>
        </div>
        <div id="pnl-body"></div>
      </div>

      <!-- Cumulative P&L Chart -->
      <div id="cumulative-section" class="chart-container" style="display:none;">
        <div class="chart-header">
          <span class="chart-title">Cumulative P&L</span>
          <div class="chart-legend" id="cumulative-legend"></div>
        </div>
        <div id="cumulative-chart" class="chart-area"></div>
      </div>
    </div>

    <!-- Status -->
    <div id="status"></div>
  </div>
  <script src="assets/app.js"></script>
</body>
</html>
